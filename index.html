<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite de Casamento - Felipe & Lídia</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(#fff, #f7f3ea);
      color: #333;
      text-align: center;
    }

    header {
      padding: 60px 20px 20px;
    }

    h1 {
      color: #c9a227;
      font-size: 44px;
      margin: 0;
    }

    h2 {
      color: #666;
      font-weight: normal;
    }

    .info {
      margin: 20px;
      font-size: 18px;
      line-height: 1.6;
    }

    #countdown {
      font-size: 26px;
      color: #c9a227;
      margin: 25px 0;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      margin-top: 20px;
    }

    .btn {
      background: #c9a227;
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      width: 260px;
      display: inline-block;
      transition: 0.3s;
    }

    .btn:hover {
      background: #a8841c;
      transform: scale(1.03);
    }

    footer {
      margin-top: 40px;
      font-size: 14px;
      color: #777;
      padding-bottom: 30px;
    }
